name: SFTP Deploy

on:
  push:
    branches:
      - master

jobs:
  ftp-deploy:
    name: Upload files to FTP server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via pure SFTP
        uses: elgohr/sftp-action@v0.6.0
        with:
          host: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          localPath: .
          remotePath: "/home/nathanmoeller/public_html"
          options: "-r"
          exclude: ".git* .github*"
